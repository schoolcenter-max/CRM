<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School Center — CRM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#1565C0;      /* azul School Center */
  --pd:#0D47A1;     /* azul oscuro */
  --pl:#E3F2FD;     /* azul muy claro */
  --pm:#BBDEFB;     /* azul medio */
  --acc:#1E88E5;    /* azul brillante accent */
  --dark:#1A1A2E;   /* casi negro azulado */
  --a:#f59e0b;--al:#fffbeb;
  --s:#0ea5e9;--sl:#e0f2fe;
  --g:#10b981;--gl:#ecfdf5;
  --v:#7c3aed;--vl:#f5f3ff;
  --slate:#0f172a;--sm:#475569;--sl2:#94a3b8;
  --border:#e2e8f0;--bg:#F0F4FF;--white:#fff;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--slate);min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(145deg,var(--dark) 0%,var(--pd) 60%,var(--p) 100%)}
.login-box{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;
  box-shadow:0 32px 80px rgba(0,0,0,.35);text-align:center}
.login-logo-wrap{margin-bottom:20px}
.login-logo-wrap img{width:180px;height:auto}
.login-box h2{font-size:14px;font-weight:600;color:var(--sm);margin-bottom:24px;letter-spacing:.3px}
.lf{margin-bottom:14px;text-align:left}
.lf label{font-size:12px;font-weight:600;color:var(--sm);display:block;margin-bottom:5px}
.lf input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border .2s}
.lf input:focus{border-color:var(--p)}
.login-btn{width:100%;padding:12px;background:var(--p);color:#fff;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;
  transition:background .2s}
.login-btn:hover{background:var(--pd)}
.login-err{color:#ef4444;font-size:13px;margin-top:10px;display:none}

/* LOADING */
#loading-screen{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:200;
  align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading-screen.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--pl);border-top-color:var(--p);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;font-weight:600;color:var(--sm)}

#app{display:none}

/* TOPBAR */
.topbar{background:var(--dark);border-bottom:3px solid var(--p);padding:10px 16px;position:sticky;top:0;z-index:50}
.topbar-row1{display:flex;align-items:center;gap:10px}
.tlogo-wrap{display:flex;align-items:center;gap:10px}
.tlogo-wrap img{height:30px;width:auto;filter:brightness(0) invert(1)}
.ttitle{font-size:13px;font-weight:700;color:rgba(255,255,255,.6);line-height:1.1}
.tsub{font-size:10px;color:rgba(255,255,255,.4)}
.btn-new{padding:8px 14px;background:var(--p);color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;
  transition:background .2s}
.btn-new:hover{background:var(--acc)}
.topbar-row2{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.upill{background:rgba(255,255,255,.12);color:#fff;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.2)}
.sinp{flex:1;min-width:100px;padding:7px 10px;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;
  font-size:13px;font-family:'Inter',sans-serif;outline:none;background:rgba(255,255,255,.1);color:#fff}
.sinp::placeholder{color:rgba(255,255,255,.4)}
.sinp:focus{border-color:var(--acc);background:rgba(255,255,255,.15)}
.fsel{padding:7px 8px;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;font-size:12px;
  font-family:'Inter',sans-serif;background:rgba(255,255,255,.1);color:#fff;outline:none;max-width:160px}
.fsel option{background:var(--dark);color:#fff}
.btn-out{padding:7px 10px;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;
  background:transparent;color:rgba(255,255,255,.7);font-size:12px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif}
.btn-out:hover{background:rgba(255,255,255,.1)}
.sync-badge{font-size:11px;color:#4ade80;font-weight:600;display:none}
.sync-badge.err{color:#f87171}

/* TABS */
.nav-tabs{display:flex;border-bottom:2px solid var(--border);padding:0 16px;background:#fff;gap:4px}
.nav-tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--sl2);border:none;background:none;
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:'Inter',sans-serif}
.nav-tab.active{color:var(--p);border-bottom-color:var(--p)}

/* STATS */
.stats-row{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:10px;padding:8px 14px;text-align:center;
  min-width:88px;border:1.5px solid var(--border);flex:1;border-top:3px solid transparent}
.stat-num{font-size:20px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--sl2);font-weight:600;margin-top:1px}

/* KANBAN */
#view-kanban{display:flex;gap:12px;padding:0 16px 24px;overflow-x:auto;align-items:flex-start}
.kcol{min-width:220px;max-width:250px;flex:0 0 230px}
.khead{border-radius:10px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.klabel{font-weight:700;font-size:13px}
.kcount{margin-left:auto;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;color:#fff}
.kempty{text-align:center;color:#cbd5e1;font-size:13px;padding:20px 0}
.kcard{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px 13px;
  cursor:pointer;margin-bottom:8px;-webkit-tap-highlight-color:transparent;
  border-left:3px solid var(--p);transition:box-shadow .15s}
.kcard:active{box-shadow:0 4px 16px rgba(21,101,192,.15)}
.kname{font-weight:700;font-size:14px;color:var(--slate);margin-bottom:3px}
.ksrv{font-size:12px;color:var(--sl2);margin-bottom:5px}
.kcita{font-size:12px;color:var(--p);font-weight:600;margin-bottom:3px}
.kphone{font-size:12px;color:var(--sl2)}
.kase{font-size:11px;color:var(--p);font-weight:600;margin-top:5px}
.btn-agendar{margin-top:8px;width:100%;padding:8px;background:var(--pl);color:var(--p);
  border:1.5px solid var(--p);border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif}
.btn-agendar:active{background:var(--p);color:#fff}

/* CITAS */
#view-citas{display:none;padding:0 16px 24px}
.cal-nav{display:flex;align-items:center;gap:8px;margin-top:12px;margin-bottom:12px}
.cal-nav h3{font-size:14px;font-weight:700;color:var(--slate);flex:1;text-align:center}
.cal-btn{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;
  font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;color:var(--sm)}
.cal-btn:hover{background:var(--pl);border-color:var(--p);color:var(--p)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-day{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 4px;
  min-height:78px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s}
.cal-day:hover{border-color:var(--p)}
.cal-day.today{border-color:var(--p);background:var(--pl)}
.cal-day.dia-sel{border-color:var(--pd);border-width:2.5px;background:var(--pl)}
.cal-day-name{font-size:9px;font-weight:700;color:var(--sl2);text-transform:uppercase;text-align:center}
.cal-day-num{font-size:15px;font-weight:800;color:var(--slate);text-align:center;margin-bottom:4px}
.cal-day.today .cal-day-num,.cal-day.dia-sel .cal-day-num{color:var(--p)}
.cal-chip{border-radius:5px;padding:2px 4px;font-size:9px;font-weight:700;margin-bottom:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;
  background:var(--pl);color:var(--p)}
.cal-chip.h-tarde{background:#e0f2fe;color:#0369a1}
.cal-chip.h-sab{background:var(--gl);color:var(--g)}
.dia-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dia-header h4{font-size:14px;font-weight:700;color:var(--slate)}
.dia-clear{background:none;border:none;font-size:12px;color:var(--sl2);cursor:pointer;
  font-family:'Inter',sans-serif;text-decoration:underline}
.section-title{font-size:14px;font-weight:700;color:var(--slate);margin-bottom:10px;
  padding-bottom:6px;border-bottom:2px solid var(--p)}
.cita-list{display:flex;flex-direction:column;gap:8px}
.cita-row{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  border-left:3px solid var(--p)}
.cita-row:active{background:var(--bg)}
.cita-fecha-box{background:var(--p);color:#fff;border-radius:8px;padding:6px 10px;
  text-align:center;min-width:48px;flex-shrink:0}
.cita-fecha-d{font-size:17px;font-weight:800;line-height:1}
.cita-fecha-m{font-size:9px;font-weight:700;text-transform:uppercase;opacity:.85}
.cita-info{flex:1;min-width:0}
.cita-nombre{font-weight:700;font-size:14px;color:var(--slate)}
.cita-det{font-size:11px;color:var(--sl2);margin-top:2px}
.cita-horario{font-size:11px;font-weight:600;color:var(--p);white-space:nowrap;text-align:right;flex-shrink:0}
.no-citas{text-align:center;color:var(--sl2);padding:24px;font-size:14px;background:#fff;
  border-radius:10px;border:1.5px solid var(--border)}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(13,71,161,.45);z-index:100;
  align-items:flex-end;justify-content:center}
.moverlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;
  max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.18)}
.mhead{padding:16px 20px 12px;border-bottom:1px solid #f1f5f9;display:flex;
  justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;
  border-top:3px solid var(--p)}
.mhead h2{font-size:16px;font-weight:800;color:var(--slate)}
.mclose{background:none;border:none;font-size:24px;cursor:pointer;color:var(--sl2);line-height:1;padding:0 4px}
.mbody{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.fg label{font-size:12px;font-weight:600;color:var(--sm);display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:8px;font-size:15px;font-family:'Inter',sans-serif;outline:none;
  color:var(--slate);background:#fff;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfoot{padding:12px 20px 24px;border-top:1px solid #f1f5f9;display:flex;gap:10px}
.btn-del{padding:10px 14px;border:1.5px solid #fecaca;border-radius:8px;background:#fff;
  color:#ef4444;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-can{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;
  color:var(--sm);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-sav{flex:2;padding:10px;border:none;border-radius:8px;background:var(--p);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-sav:hover{background:var(--pd)}
.etapa-selector{display:flex;flex-direction:column;gap:6px}
.etapa-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  border:1.5px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;
  -webkit-tap-highlight-color:transparent}
.etapa-dot2{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.horario-cards{display:flex;flex-direction:column;gap:8px}
.horario-card{padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;
  font-size:14px;font-weight:600;color:var(--sm);-webkit-tap-highlight-color:transparent}
.horario-card.sel{border-color:var(--p);background:var(--pl);color:var(--p)}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Conectando…</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo-wrap">
      <svg viewBox="0 0 260 90" width="220" xmlns="http://www.w3.org/2000/svg">
        <!-- Car body -->
        <path d="M30 62 Q35 38 70 32 L100 28 L160 28 L190 32 Q225 38 230 62 Z" fill="#1565C0"/>
        <!-- Windshield cutout -->
        <path d="M80 32 Q90 18 130 16 Q170 18 180 32 Z" fill="#E3F2FD"/>
        <!-- Wheels -->
        <circle cx="72" cy="64" r="14" fill="#0D47A1"/>
        <circle cx="72" cy="64" r="7" fill="#E3F2FD"/>
        <circle cx="188" cy="64" r="14" fill="#0D47A1"/>
        <circle cx="188" cy="64" r="7" fill="#E3F2FD"/>
        <!-- Text -->
        <text x="130" y="53" font-family="Arial Black,sans-serif" font-weight="900" font-size="13" fill="white" text-anchor="middle" letter-spacing="1">SCHOOL CENTER</text>
        <text x="130" y="82" font-family="Arial,sans-serif" font-size="8.5" fill="#1565C0" text-anchor="middle" letter-spacing=".5">Centro de Enseñanza Automovilística</text>
      </svg>
    </div>
    <h2>Sistema de Gestión de Clientes</h2>
    <div class="lf"><label>Usuario</label><input type="text" id="inp-user" placeholder="Ej. admin" autocomplete="username"/></div>
    <div class="lf"><label>Contraseña</label><input type="password" id="inp-pass" placeholder="••••••" autocomplete="current-password"/></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Ingresar →</button>
    <p class="login-err" id="login-err">Usuario o contraseña incorrectos.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="tlogo-wrap">
        <svg viewBox="0 0 260 90" height="28" xmlns="http://www.w3.org/2000/svg">
          <path d="M30 62 Q35 38 70 32 L100 28 L160 28 L190 32 Q225 38 230 62 Z" fill="white"/>
          <path d="M80 32 Q90 18 130 16 Q170 18 180 32 Z" fill="rgba(255,255,255,.3)"/>
          <circle cx="72" cy="64" r="14" fill="rgba(255,255,255,.7)"/>
          <circle cx="72" cy="64" r="7" fill="white"/>
          <circle cx="188" cy="64" r="14" fill="rgba(255,255,255,.7)"/>
          <circle cx="188" cy="64" r="7" fill="white"/>
          <text x="130" y="53" font-family="Arial Black,sans-serif" font-weight="900" font-size="13" fill="#1565C0" text-anchor="middle" letter-spacing="1">SCHOOL CENTER</text>
        </svg>
        <div><div class="ttitle">CRM</div><div class="tsub" id="total-lbl">0 clientes</div></div>
      </div>
      <button class="btn-new" style="margin-left:auto" onclick="openModal()">+ Nuevo</button>
    </div>
    <div class="topbar-row2">
      <span class="upill" id="user-pill">—</span>
      <input class="sinp" id="search-inp" placeholder="Buscar…" oninput="render()"/>
      <select class="fsel" id="filter-srv" onchange="render()">
        <option value="">Todos los servicios</option>
        <option>A2 — Motocicleta 🏍️</option>
        <option>B1 — Particular 🚗</option>
        <option>C1 — Servicio Público 🚌</option>
        <option>B1 + A2</option><option>C1 + A2</option>
        <option>Refuerzo — Vehículo</option>
        <option>Refuerzo — Motocicleta</option>
        <option>Refuerzo — Eléctrico</option>
      </select>
      <span class="sync-badge" id="sync-badge">✓ Guardado</span>
      <button class="btn-out" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-kanban" onclick="setTab('kanban')">⬜ Tablero</button>
    <button class="nav-tab" id="tab-citas" onclick="setTab('citas')">📅 Citas</button>
  </div>

  <div class="stats-row" id="stats-row"></div>
  <div id="view-kanban"></div>

  <div id="view-citas">
    <div class="cal-nav">
      <button class="cal-btn" onclick="semana(-1)">←</button>
      <h3 id="cal-title"></h3>
      <button class="cal-btn" onclick="semana(1)">→</button>
      <button class="cal-btn" onclick="irHoy()">Hoy</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="citas-section-header" class="dia-header" style="display:none">
      <h4 id="citas-day-title"></h4>
      <button class="dia-clear" onclick="clearDiaSel()">Ver todas →</button>
    </div>
    <div id="citas-section-all" class="section-title">Próximas citas</div>
    <div class="cita-list" id="cita-list"></div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="moverlay" id="modal-cliente" onclick="overlayClick(event,'modal-cliente')">
  <div class="modal">
    <div class="mhead">
      <h2 id="modal-title">Nuevo cliente</h2>
      <button class="mclose" onclick="closeModal('modal-cliente')">×</button>
    </div>
    <div class="mbody">
      <div class="frow">
        <div class="fg"><label>Nombre completo *</label><input type="text" id="f-nombre" placeholder="Juan Pérez"/></div>
        <div class="fg"><label>Teléfono *</label><input type="tel" id="f-telefono" placeholder="310 000 0000"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>N° de documento *</label><input type="text" id="f-documento" placeholder="CC / TI / CE…"/></div>
        <div class="fg"><label>Email</label><input type="email" id="f-email" placeholder="correo@ejemplo.com"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Servicio *</label>
          <select id="f-servicio">
            <option value="">Seleccionar</option>
            <option>A2 — Motocicleta 🏍️</option><option>B1 — Particular 🚗</option>
            <option>C1 — Servicio Público 🚌</option><option>B1 + A2</option><option>C1 + A2</option>
            <option>Refuerzo — Vehículo</option><option>Refuerzo — Motocicleta</option>
            <option>Refuerzo — Eléctrico</option>
          </select>
        </div>
        <div class="fg"><label>Asesor</label><input type="text" id="f-asesor" placeholder="Nombre"/></div>
      </div>
      <div class="fg"><label>Etapa</label><div class="etapa-selector" id="etapa-selector"></div></div>
      <div id="cita-fields" style="display:none;flex-direction:column;gap:12px">
        <div class="frow">
          <div class="fg"><label>Fecha cita</label><input type="date" id="f-fecha"/></div>
          <div class="fg"><label>Horario</label>
            <select id="f-horario">
              <option value="">Seleccionar</option>
              <option>Lun–Vie 7:30 a.m. – 10:00 a.m.</option>
              <option>Lun–Vie 1:00 p.m. – 2:30 p.m.</option>
              <option>Sábado 7:30 a.m. – 10:00 a.m.</option>
            </select>
          </div>
        </div>
      </div>
      <div class="fg"><label>Notas</label><textarea id="f-notas" rows="3" placeholder="Observaciones…"></textarea></div>
    </div>
    <div class="mfoot">
      <button class="btn-del" id="btn-del" style="display:none" onclick="deleteCliente()">Eliminar</button>
      <button class="btn-can" onclick="closeModal('modal-cliente')">Cancelar</button>
      <button class="btn-sav" onclick="saveCliente()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL AGENDAR -->
<div class="moverlay" id="modal-agendar" onclick="overlayClick(event,'modal-agendar')">
  <div class="modal" style="max-width:480px">
    <div class="mhead">
      <h2>📅 Agendar cita</h2>
      <button class="mclose" onclick="closeModal('modal-agendar')">×</button>
    </div>
    <div class="mbody">
      <div style="background:var(--pl);border-radius:10px;padding:12px 14px;border-left:3px solid var(--p)">
        <div style="font-weight:700;font-size:15px;color:var(--slate)" id="ag-nombre"></div>
        <div style="font-size:12px;color:var(--sl2);margin-top:2px" id="ag-srv"></div>
      </div>
      <div class="fg"><label>Fecha *</label><input type="date" id="ag-fecha"/></div>
      <div class="fg"><label>Horario *</label>
        <div class="horario-cards">
          <div class="horario-card" id="hc0" onclick="selHorario(0,'Lun–Vie 7:30 a.m. – 10:00 a.m.')">🕖 Lun–Vie · 7:30 a.m. – 10:00 a.m.</div>
          <div class="horario-card" id="hc1" onclick="selHorario(1,'Lun–Vie 1:00 p.m. – 2:30 p.m.')">🕐 Lun–Vie · 1:00 p.m. – 2:30 p.m.</div>
          <div class="horario-card" id="hc2" onclick="selHorario(2,'Sábado 7:30 a.m. – 10:00 a.m.')">🕖 Sábado · 7:30 a.m. – 10:00 a.m.</div>
        </div>
      </div>
      <div class="fg"><label>Notas (opcional)</label><textarea id="ag-notas" rows="2" placeholder="Observaciones…"></textarea></div>
    </div>
    <div class="mfoot">
      <button class="btn-can" onclick="closeModal('modal-agendar')">Cancelar</button>
      <button class="btn-sav" onclick="confirmarCita()">Confirmar cita →</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL="https://script.google.com/macros/s/AKfycbxBotFCBHwoWK6JY8_0ErNucl7gU8d1XDqWngwqYMYc9Sjv6iFd6pmYC_YZx2lm5-NI/exec";
const ETAPAS=[
  {id:"Interesado",   color:"#6366f1",bg:"#eef2ff"},
  {id:"Venta Cerrada",color:"#f59e0b",bg:"#fffbeb"},
  {id:"Cita Agendada",color:"#1565C0",bg:"#E3F2FD"},
  {id:"En Curso",     color:"#10b981",bg:"#ecfdf5"},
  {id:"Egresado",     color:"#7c3aed",bg:"#f5f3ff"},
];
const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const DIAS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
let currentUser=null,clientes=[],editingId=null,agendandoId=null,horarioSel="";
let tabActual="kanban",semanaOffset=0,diaSelStr=null;

async function api(params){
  const url=new URL(SHEETS_URL);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const r=await fetch(url.toString());
  return r.json();
}
function showLoading(txt="Cargando…"){document.getElementById("loading-txt").textContent=txt;document.getElementById("loading-screen").classList.add("show");}
function hideLoading(){document.getElementById("loading-screen").classList.remove("show");}
function showSync(ok){const b=document.getElementById("sync-badge");b.style.display="inline";b.className="sync-badge"+(ok?"":" err");b.textContent=ok?"✓ Guardado":"⚠ Error";setTimeout(()=>b.style.display="none",3000);}

async function doLogin(){
  const u=document.getElementById("inp-user").value.trim().toLowerCase();
  const p=document.getElementById("inp-pass").value;
  const btn=document.getElementById("login-btn");
  btn.textContent="Verificando…";btn.disabled=true;
  showLoading("Verificando credenciales…");
  try{
    const res=await api({action:"login",user:u,pass:p});
    if(res.ok){currentUser={user:res.user,rol:res.rol};sessionStorage.setItem("crm_sess",JSON.stringify(currentUser));await showApp();}
    else{document.getElementById("login-err").textContent="Usuario o contraseña incorrectos.";document.getElementById("login-err").style.display="block";}
  }catch(e){document.getElementById("login-err").textContent="Error de conexión. Intenta de nuevo.";document.getElementById("login-err").style.display="block";}
  btn.textContent="Ingresar →";btn.disabled=false;hideLoading();
}
document.getElementById("inp-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
document.getElementById("inp-user").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("inp-pass").focus();});

function logout(){
  sessionStorage.removeItem("crm_sess");currentUser=null;clientes=[];
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("inp-user").value="";document.getElementById("inp-pass").value="";
  document.getElementById("login-err").style.display="none";
}
async function showApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("user-pill").textContent="👤 "+currentUser.user+(currentUser.rol==="admin"?" (admin)":"");
  showLoading("Cargando clientes…");
  try{const res=await api({action:"getAll"});clientes=res.clientes||[];}catch(e){clientes=[];}
  hideLoading();render();
}
function setTab(t){
  tabActual=t;
  document.getElementById("view-kanban").style.display=t==="kanban"?"flex":"none";
  document.getElementById("view-citas").style.display=t==="citas"?"block":"none";
  document.getElementById("tab-kanban").classList.toggle("active",t==="kanban");
  document.getElementById("tab-citas").classList.toggle("active",t==="citas");
  if(t==="citas")renderCitas();
}
function getFiltered(){
  const q=document.getElementById("search-inp").value.toLowerCase();
  const srv=document.getElementById("filter-srv").value;
  return clientes.filter(c=>{
    if(currentUser.rol==="asesor"&&c.asesor!==currentUser.user)return false;
    if(q&&!c.nombre.toLowerCase().includes(q)&&!c.telefono.includes(q)&&!(c.documento||"").includes(q)&&!(c.email||"").toLowerCase().includes(q))return false;
    if(srv&&c.servicio!==srv)return false;
    return true;
  });
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fmtDate(d){return d.toISOString().slice(0,10)}
function render(){
  const f=getFiltered();
  document.getElementById("total-lbl").textContent=clientes.length+" clientes";
  document.getElementById("stats-row").innerHTML=ETAPAS.map(e=>`
    <div class="stat-card" style="border-top-color:${e.color}">
      <div class="stat-num" style="color:${e.color}">${f.filter(c=>c.etapa===e.id).length}</div>
      <div class="stat-lbl">${e.id}</div>
    </div>`).join("");
  document.getElementById("view-kanban").innerHTML=ETAPAS.map(e=>{
    const cols=f.filter(c=>c.etapa===e.id);
    return `<div class="kcol">
      <div class="khead" style="background:${e.bg};border:1.5px solid ${e.color}33">
        <span class="kdot" style="background:${e.color}"></span>
        <span class="klabel" style="color:${e.color}">${e.id}</span>
        <span class="kcount" style="background:${e.color}">${cols.length}</span>
      </div>
      ${cols.length===0?'<div class="kempty">Sin clientes</div>':""}
      ${cols.map(c=>`
        <div class="kcard" style="border-left-color:${e.color}" onclick="openModal('${c.id}')">
          <div class="kname">${esc(c.nombre)}</div>
          <div class="ksrv">${esc(c.servicio)}</div>
          ${c.documento?`<div class="kphone">🪪 ${esc(c.documento)}</div>`:""}
          ${c.fecha?`<div class="kcita">📅 ${c.fecha}</div>`:""}
          <div class="kphone">📞 ${esc(c.telefono)}</div>
          ${c.asesor?`<div class="kase">👤 ${esc(c.asesor)}</div>`:""}
          ${c.etapa==="Venta Cerrada"?`<button class="btn-agendar" onclick="event.stopPropagation();openAgendar('${c.id}')">📅 Agendar cita</button>`:""}
        </div>`).join("")}
    </div>`;
  }).join("");
  if(tabActual==="citas")renderCitas();
}
function getLunes(offset){
  const hoy=new Date();const dia=hoy.getDay();
  const lunes=new Date(hoy);lunes.setDate(hoy.getDate()-(dia===0?6:dia-1)+offset*7);lunes.setHours(0,0,0,0);return lunes;
}
function semana(d){semanaOffset+=d;diaSelStr=null;renderCitas();}
function irHoy(){semanaOffset=0;diaSelStr=null;renderCitas();}
function selDia(ds){diaSelStr=diaSelStr===ds?null:ds;renderCitas();}
function clearDiaSel(){diaSelStr=null;renderCitas();}
function renderCitas(){
  const lunes=getLunes(semanaOffset);
  const dias=Array.from({length:7},(_,i)=>{const d=new Date(lunes);d.setDate(lunes.getDate()+i);return d;});
  const hoy=new Date();hoy.setHours(0,0,0,0);
  document.getElementById("cal-title").textContent=`${dias[0].getDate()} ${MESES[dias[0].getMonth()]} – ${dias[6].getDate()} ${MESES[dias[6].getMonth()]}`;
  const conFecha=clientes.filter(c=>c.fecha&&["Cita Agendada","En Curso"].includes(c.etapa));
  document.getElementById("cal-grid").innerHTML=dias.map(d=>{
    const ds=fmtDate(d);const citasD=conFecha.filter(c=>c.fecha===ds);
    const isHoy=d.getTime()===hoy.getTime();const isSel=ds===diaSelStr;
    const chips=citasD.map(c=>{
      const cls=c.horario&&c.horario.includes("1:00")?"h-tarde":c.horario&&c.horario.includes("Sáb")?"h-sab":"";
      return `<span class="cal-chip ${cls}">${esc(c.nombre.split(" ")[0])}</span>`;
    }).join("");
    return `<div class="cal-day${isHoy?" today":""}${isSel?" dia-sel":""}" onclick="selDia('${ds}')">
      <div class="cal-day-name">${DIAS[d.getDay()]}</div>
      <div class="cal-day-num">${d.getDate()}</div>${chips}</div>`;
  }).join("");
  const hoyStr=fmtDate(hoy);let lista;
  if(diaSelStr){
    const dObj=new Date(diaSelStr+"T12:00:00");
    document.getElementById("citas-section-header").style.display="flex";
    document.getElementById("citas-section-all").style.display="none";
    document.getElementById("citas-day-title").textContent=`📅 ${DIAS[dObj.getDay()]} ${dObj.getDate()} de ${MESES[dObj.getMonth()]}`;
    lista=conFecha.filter(c=>c.fecha===diaSelStr).sort((a,b)=>(a.horario||"").localeCompare(b.horario||""));
  }else{
    document.getElementById("citas-section-header").style.display="none";
    document.getElementById("citas-section-all").style.display="block";
    lista=conFecha.filter(c=>c.fecha>=hoyStr).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  }
  const el=document.getElementById("cita-list");
  if(!lista.length){el.innerHTML=`<div class="no-citas">${diaSelStr?"No hay citas este día.":"No hay citas próximas."}</div>`;return;}
  el.innerHTML=lista.map(c=>{
    const fd=new Date(c.fecha+"T12:00:00");
    return `<div class="cita-row" onclick="openModal('${c.id}')">
      <div class="cita-fecha-box"><div class="cita-fecha-d">${fd.getDate()}</div><div class="cita-fecha-m">${MESES[fd.getMonth()]}</div></div>
      <div class="cita-info"><div class="cita-nombre">${esc(c.nombre)}</div>
        <div class="cita-det">${esc(c.servicio)}${c.asesor?" · 👤 "+esc(c.asesor):""}${c.documento?" · 🪪 "+esc(c.documento):""}</div></div>
      <div class="cita-horario">${esc(c.horario||"")}</div>
    </div>`;
  }).join("");
}
function buildEtapaSelector(selected){
  document.getElementById("etapa-selector").innerHTML=ETAPAS.map(e=>{
    const isSel=e.id===selected;
    return `<div class="etapa-opt" id="eopt-${e.id.replace(/ /g,'-')}"
      style="color:${e.color};background:${isSel?e.bg:"#fff"};border-color:${isSel?e.color:"var(--border)"};border-width:${isSel?"2px":"1.5px"}"
      onclick="selectEtapa('${e.id}')">
      <span class="etapa-dot2" style="background:${e.color}"></span>${e.id}</div>`;
  }).join("");
}
function selectEtapa(id){
  ETAPAS.forEach(e=>{
    const el=document.getElementById("eopt-"+e.id.replace(/ /g,'-'));if(!el)return;
    const isSel=e.id===id;el.style.background=isSel?e.bg:"#fff";
    el.style.borderColor=isSel?e.color:"var(--border)";el.style.borderWidth=isSel?"2px":"1.5px";
  });
  document.getElementById("cita-fields").style.display=(id==="Cita Agendada"||id==="En Curso")?"flex":"none";
}
function getEtapaSel(){
  for(const e of ETAPAS){const el=document.getElementById("eopt-"+e.id.replace(/ /g,'-'));if(el&&el.style.borderWidth==="2px")return e.id;}
  return "Interesado";
}
function openModal(id){
  editingId=id||null;const c=id?clientes.find(x=>x.id===id):null;
  document.getElementById("modal-title").textContent=c?"Editar cliente":"Nuevo cliente";
  document.getElementById("btn-del").style.display=c?"inline-block":"none";
  document.getElementById("f-nombre").value=c?.nombre||"";
  document.getElementById("f-telefono").value=c?.telefono||"";
  document.getElementById("f-documento").value=c?.documento||"";
  document.getElementById("f-email").value=c?.email||"";
  document.getElementById("f-servicio").value=c?.servicio||"";
  document.getElementById("f-asesor").value=c?.asesor||(currentUser.rol==="asesor"?currentUser.user:"");
  document.getElementById("f-fecha").value=c?.fecha||"";
  document.getElementById("f-horario").value=c?.horario||"";
  document.getElementById("f-notas").value=c?.notas||"";
  const etapa=c?.etapa||"Interesado";buildEtapaSelector(etapa);
  document.getElementById("cita-fields").style.display=["Cita Agendada","En Curso"].includes(etapa)?"flex":"none";
  document.getElementById("modal-cliente").classList.add("open");
}
function closeModal(id){document.getElementById(id).classList.remove("open");editingId=null;agendandoId=null;horarioSel="";}
function overlayClick(e,id){if(e.target===e.currentTarget)closeModal(id);}
async function saveCliente(){
  const nombre=document.getElementById("f-nombre").value.trim();
  const telefono=document.getElementById("f-telefono").value.trim();
  const servicio=document.getElementById("f-servicio").value;
  if(!nombre||!telefono||!servicio){alert("Completa nombre, teléfono y servicio.");return;}
  const etapa=getEtapaSel();
  const obj={id:editingId||(Date.now().toString(36)+Math.random().toString(36).slice(2)),
    nombre,telefono,documento:document.getElementById("f-documento").value.trim(),
    email:document.getElementById("f-email").value.trim(),servicio,etapa,
    fecha:document.getElementById("f-fecha").value,horario:document.getElementById("f-horario").value,
    asesor:document.getElementById("f-asesor").value.trim(),notas:document.getElementById("f-notas").value.trim(),
    creado:editingId?(clientes.find(x=>x.id===editingId)?.creado||new Date().toISOString()):new Date().toISOString()};
  if(editingId)clientes=clientes.map(x=>x.id===editingId?obj:x);else clientes.push(obj);
  render();closeModal("modal-cliente");
  try{await api({action:"save",cliente:JSON.stringify(obj)});showSync(true);}catch(e){showSync(false);}
}
async function deleteCliente(){
  if(!confirm("¿Eliminar este cliente?"))return;
  const id=editingId;clientes=clientes.filter(x=>x.id!==id);
  render();closeModal("modal-cliente");
  try{await api({action:"delete",id});showSync(true);}catch(e){showSync(false);}
}
function openAgendar(id){
  agendandoId=id;horarioSel="";const c=clientes.find(x=>x.id===id);
  document.getElementById("ag-nombre").textContent=c.nombre;
  document.getElementById("ag-srv").textContent=c.servicio;
  document.getElementById("ag-fecha").value="";document.getElementById("ag-notas").value="";
  [0,1,2].forEach(i=>document.getElementById("hc"+i).classList.remove("sel"));
  document.getElementById("modal-agendar").classList.add("open");
}
function selHorario(idx,h){[0,1,2].forEach(i=>document.getElementById("hc"+i).classList.remove("sel"));document.getElementById("hc"+idx).classList.add("sel");horarioSel=h;}
async function confirmarCita(){
  const fecha=document.getElementById("ag-fecha").value;
  if(!fecha){alert("Selecciona una fecha.");return;}if(!horarioSel){alert("Selecciona un horario.");return;}
  let obj;clientes=clientes.map(c=>{if(c.id!==agendandoId)return c;
    obj={...c,etapa:"Cita Agendada",fecha,horario:horarioSel,notas:document.getElementById("ag-notas").value.trim()||c.notas};return obj;});
  render();closeModal("modal-agendar");
  try{await api({action:"save",cliente:JSON.stringify(obj)});showSync(true);}catch(e){showSync(false);}
}
try{currentUser=JSON.parse(sessionStorage.getItem("crm_sess"));}catch{}
if(currentUser)showApp();
setTab("kanban");
</script>
</body>
</html>
